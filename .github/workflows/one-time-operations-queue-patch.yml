name: One-time operations queue patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-operations-page:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch operations page
        run: |
          python <<'PY'
          from pathlib import Path

          target = Path('examples/starter-app/src/app/operations/page.tsx')
          workflow = Path('.github/workflows/one-time-operations-queue-patch.yml')

          text = target.read_text(encoding='utf-8')

          next_action_cell = """<td style={{ padding: 14, borderBottom: '1px solid #f3f4f6', minWidth: 210 }}>
  <div style={{ display: 'grid', gap: 6 }}>
    <Pill label={nextAction.label} tone={nextAction.tone} />
    <div style={{ color: '#6b7280', fontSize: 12, lineHeight: 1.45 }}>
      {nextAction.helper}
    </div>
  </div>
</td>

"""

          updated_at_cell = """<td style={{ padding: 14, borderBottom: '1px solid #f3f4f6', color: '#6b7280' }}>
  {formatDate(row.updatedAt || row.createdAt)}
</td>"""

          if 'nextAction.helper' not in text:
              if updated_at_cell not in text:
                  raise SystemExit('Could not find Son Güncelleme cell marker for nextAction insertion.')
              text = text.replace(updated_at_cell, next_action_cell + updated_at_cell, 1)

          text = text.replace('colSpan={10}', 'colSpan={11}')

          target.write_text(text, encoding='utf-8')

          if workflow.exists():
              workflow.unlink()
          PY

      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add examples/starter-app/src/app/operations/page.tsx .github/workflows/one-time-operations-queue-patch.yml
          git commit -m "fix: render next action column in operations queue"
          git push
